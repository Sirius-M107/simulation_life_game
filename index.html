<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场卡牌冒险者：财富自由之路</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <header id="status-bar">
            <div class="status-item">
                <span class="status-label">楼层</span>
                <span id="floor" class="status-value">1</span>
            </div>
            <div class="status-item hp-container">
                <span class="status-label">血条</span>
                <div class="bar-wrapper">
                    <div id="hp-bar" class="bar hp-bar"></div>
                    <span id="hp-text" class="bar-text">100/100</span>
                </div>
            </div>
            <div class="status-item mp-container">
                <span class="status-label">蓝条</span>
                <div class="bar-wrapper">
                    <div id="mp-bar" class="bar mp-bar"></div>
                    <span id="mp-text" class="bar-text">100/100</span>
                </div>
            </div>
            <div class="status-item">
                <span class="status-label">金币</span>
                <span id="gold" class="status-value">5000</span>
            </div>
            <div class="status-item">
                <span class="status-label">技能</span>
                <span id="skill" class="status-value">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">成就感</span>
                <span id="achievement" class="status-value">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">权威</span>
                <span id="authority" class="status-value">0</span>
            </div>
        </header>

        <!-- 怪物战斗区 -->
        <section id="battle-area">
            <div id="enemy-container">
                <h2 id="enemy-name">等待中...</h2>
                <div class="enemy-status">
                    <div class="bar-wrapper">
                        <div id="enemy-hp-bar" class="bar enemy-hp-bar"></div>
                        <span id="enemy-hp-text" class="bar-text">0/0</span>
                    </div>
                </div>
                <div id="enemy-intent" class="enemy-intent"></div>
            </div>
            <div id="battle-info">
                <p id="battle-log">准备好开始你的职场冒险吧！</p>
            </div>
        </section>

        <!-- 手牌区 -->
        <section id="hand-area">
            <div id="cards-container"></div>
        </section>

        <!-- 功能按钮区 -->
        <footer id="action-bar">
            <button id="btn-end-turn" class="btn btn-primary">结束回合</button>
            <button id="btn-view-deck" class="btn">查看卡组</button>
            <button id="btn-save" class="btn">保存进度</button>
            <button id="btn-restart" class="btn btn-danger">重新开始</button>
        </footer>

        <!-- 战斗结算弹窗 -->
        <div id="battle-result-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="battle-result-title">战斗胜利</h2>
                <div id="battle-result-content"></div>
                <button id="btn-close-battle-result" class="btn btn-primary">确认</button>
            </div>
        </div>

        <!-- 随机事件弹窗 -->
        <div id="event-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="event-title">随机事件</h2>
                <p id="event-description"></p>
                <div id="event-options"></div>
            </div>
        </div>

        <!-- 伴侣任务弹窗 -->
        <div id="partner-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="partner-title">伴侣任务</h2>
                <p id="partner-description"></p>
                <div id="partner-status"></div>
                <div id="partner-options"></div>
            </div>
        </div>

        <!-- 卡组查看弹窗 -->
        <div id="deck-modal" class="modal hidden">
            <div class="modal-content">
                <h2>我的卡组</h2>
                <div id="deck-list"></div>
                <button id="btn-close-deck" class="btn btn-primary">关闭</button>
            </div>
        </div>

        <!-- 结局弹窗 -->
        <div id="ending-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="ending-title">游戏结束</h2>
                <p id="ending-description"></p>
                <button id="btn-play-again" class="btn btn-primary">再玩一次</button>
            </div>
        </div>

        <!-- 投资事件弹窗 -->
        <div id="investment-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="investment-title">投资机会</h2>
                <p id="investment-description"></p>
                <div id="investment-options"></div>
            </div>
        </div>

        <!-- 地图节点选择弹窗 -->
        <div id="map-modal" class="modal hidden">
            <div class="modal-content">
                <h2>选择下一个节点</h2>
                <div id="map-nodes"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
